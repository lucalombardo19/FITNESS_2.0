services:
  webapp:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-fitness-secret-change-me}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - USDA_API_KEY=${USDA_API_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
